<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Michi Admin</title>
  <link rel="stylesheet" href="./css/german-hyphenation.css" />
  <style>
    :root {
      --bg: #f4f4f4;
      --card: #fff;
      --ink: #111;
      --muted: #666;
      --line: #ddd;
      --accent: #2b6a2e;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
    }

    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }

    h1 { margin: 0 0 8px; font-size: 1.6rem; }
    h2 { margin: 0 0 12px; font-size: 1.1rem; }
    p { color: var(--muted); }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 0.85rem;
      margin-bottom: 4px;
      color: var(--muted);
    }

    input, select, textarea, button {
      font: inherit;
    }

    input, select, textarea {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      margin-bottom: 12px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
    }

    button {
      border: none;
      border-radius: 6px;
      padding: 10px 14px;
      cursor: pointer;
      background: var(--accent);
      color: #fff;
    }

    button.secondary {
      background: #555;
    }

    button.danger {
      background: #a11;
    }

    button.link {
      background: transparent;
      color: var(--accent);
      padding: 0;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.92rem;
    }

    th, td {
      border-bottom: 1px solid var(--line);
      padding: 8px 6px;
      text-align: left;
      vertical-align: middle;
    }

    .row-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .status {
      margin: 12px 0;
      padding: 10px 12px;
      border-radius: 6px;
      display: none;
    }

    .status.ok {
      display: block;
      background: #e7f6e8;
      color: #1f5d22;
    }

    .status.err {
      display: block;
      background: #fde8e8;
      color: #8a1111;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .hidden { display: none; }

    #deployBanner {
      margin-bottom: 16px;
      padding: 12px 14px;
      border-radius: 8px;
      background: #fff8e6;
      border: 1px solid #e8d9a8;
      color: #5a4a12;
      font-size: 0.92rem;
      line-height: 1.45;
    }

    a.link {
      color: var(--accent);
      text-decoration: none;
      margin-right: 12px;
    }

    a.link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <main>
    <div class="topbar">
      <div>
        <h1>Michi Admin</h1>
        <p>Donations, newsletter, and site settings</p>
      </div>
      <div>
        <a id="viewSiteLink" class="link" href="./photoshop-text-preview.html">View site</a>
        <button id="logoutBtn" class="secondary hidden" type="button">Log out</button>
      </div>
    </div>

    <div id="deployBanner" class="hidden"></motionless>
    <div id="status" class="status"></div>

    <section id="loginCard" class="card">
      <h2>Login</h2>
      <label for="password">Admin password</label>
      <input id="password" type="password" autocomplete="current-password" />
      <button id="loginBtn" type="button">Sign in</button>
      <p>Default password: <code>michi-admin</code> (change in Site settings)</p>
    </section>

    <section id="adminPanel" class="hidden">
      <section class="card">
        <h2>Donations</h2>
        <div class="grid">
          <div>
            <label for="target">Target (€)</label>
            <input id="target" type="number" min="0" step="1" />
          </div>
          <div>
            <label for="collected">Collected (€)</label>
            <input id="collected" type="number" min="0" step="1" />
          </div>
          <div>
            <label for="pending">Pending (€)</label>
            <input id="pending" type="number" min="0" step="1" />
          </div>
        </div>
        <label for="milestonesJson">Milestones JSON (date + amount)</label>
        <textarea id="milestonesJson" rows="6" placeholder='[{"date":"6.2026","amount":4756}]'></textarea>
        <button id="saveDonationsBtn" type="button">Save donations</button>
      </section>

      <section class="card">
        <h2>Site settings</h2>
        <label for="siteName">Site name</label>
        <input id="siteName" type="text" />
        <label for="goalDisplay">Goal label (display)</label>
        <input id="goalDisplay" type="text" placeholder="25,025€" />
        <label for="ctaText">CTA text</label>
        <input id="ctaText" type="text" />
        <label for="readMoreText">Read-more text</label>
        <input id="readMoreText" type="text" />
        <label for="adminPassword">New admin password (leave blank to keep)</label>
        <input id="adminPassword" type="password" autocomplete="new-password" />
        <button id="saveSettingsBtn" type="button">Save settings</button>
      </section>

      <section class="card">
        <h2>Status updates</h2>
        <label for="statusUpdatesJson">Status updates JSON</label>
        <textarea id="statusUpdatesJson" rows="8" placeholder='[{"date":"16.05.2026","text":"Update"}]'></textarea>
        <button id="saveStatusUpdatesBtn" type="button">Save status updates</button>
      </section>

      <section class="card">
        <h2>Homepage content and titles</h2>
        <label for="heroTitleHtml">Hero title HTML</label>
        <textarea id="heroTitleHtml" rows="7"></textarea>
        <label for="greetingHtml">Greeting HTML</label>
        <textarea id="greetingHtml" rows="4"></textarea>
        <label for="introHtml">Welcome body HTML</label>
        <textarea id="introHtml" rows="8"></textarea>
        <label for="articleHtml">Main article HTML</label>
        <textarea id="articleHtml" rows="14"></textarea>
        <button id="saveContentBtn" type="button">Save homepage content</button>
      </section>

      <section class="card">
        <h2>Newsletter list</h2>
        <div class="grid">
          <div>
            <label for="newEmail">Email</label>
            <input id="newEmail" type="email" />
          </div>
          <div>
            <label for="newName">Name</label>
            <input id="newName" type="text" />
          </div>
          <div>
            <label for="newStatus">Status</label>
            <select id="newStatus">
              <option value="active">active</option>
              <option value="pending">pending</option>
              <option value="unsubscribed">unsubscribed</option>
            </select>
          </div>
        </div>
        <button id="addSubscriberBtn" type="button">Add subscriber</button>

        <table style="margin-top: 16px">
          <thead>
            <tr>
              <th>Email</th>
              <th>Name</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="newsletterBody"></tbody>
        </table>
      </section>
    </section>
  </main>

  <script>
    const TOKEN_KEY = "michiAdminToken";
    const statusEl = document.getElementById("status");
    const loginCard = document.getElementById("loginCard");
    const adminPanel = document.getElementById("adminPanel");
    const logoutBtn = document.getElementById("logoutBtn");

    function token() {
      return localStorage.getItem(TOKEN_KEY);
    }

    function authHeaders(json = true) {
      const headers = { Authorization: "Bearer " + token() };
      if (json) headers["Content-Type"] = "application/json";
      return headers;
    }

    function showStatus(message, ok = true) {
      statusEl.textContent = message;
      statusEl.className = "status " + (ok ? "ok" : "err");
    }

    function setLoggedIn(loggedIn) {
      loginCard.classList.toggle("hidden", loggedIn);
      adminPanel.classList.toggle("hidden", !loggedIn);
      logoutBtn.classList.toggle("hidden", !loggedIn);
    }

    async function api(path, options = {}) {
      const response = await fetch(path, options);
      const data = await response.json().catch(() => ({}));
      if (!response.ok) {
        throw new Error(data.error || "Request failed");
      }
      return data;
    }

    async function loadAdminData() {
      const data = await api("/api/site", { headers: authHeaders(false) });
      document.getElementById("target").value = data.donations.target;
      document.getElementById("collected").value = data.donations.collected;
      document.getElementById("pending").value = data.donations.pending;
      document.getElementById("milestonesJson").value = JSON.stringify(
        data.donations.milestones || [],
        null,
        2
      );
      document.getElementById("siteName").value = data.settings.siteName || "";
      document.getElementById("goalDisplay").value = data.settings.goalDisplay || "";
      document.getElementById("ctaText").value = data.settings.ctaText || "";
      document.getElementById("readMoreText").value = data.settings.readMoreText || "";
      document.getElementById("statusUpdatesJson").value = JSON.stringify(
        data.statusUpdates || [],
        null,
        2
      );
      document.getElementById("heroTitleHtml").value = data.content?.heroTitleHtml || "";
      document.getElementById("greetingHtml").value = data.content?.greetingHtml || "";
      document.getElementById("introHtml").value = data.content?.introHtml || "";
      document.getElementById("articleHtml").value = data.content?.articleHtml || "";
      renderNewsletter(data.newsletter || []);
    }

    function renderNewsletter(list) {
      const body = document.getElementById("newsletterBody");
      body.innerHTML = "";
      list.forEach((entry) => {
        const row = document.createElement("tr");
        row.innerHTML = `
          <td><input data-field="email" data-id="${entry.id}" value="${entry.email}" /></td>
          <td><input data-field="name" data-id="${entry.id}" value="${entry.name || ""}" /></td>
          <td>
            <select data-field="status" data-id="${entry.id}">
              <option value="active" ${entry.status === "active" ? "selected" : ""}>active</option>
              <option value="pending" ${entry.status === "pending" ? "selected" : ""}>pending</option>
              <option value="unsubscribed" ${entry.status === "unsubscribed" ? "selected" : ""}>unsubscribed</option>
            </select>
          </td>
          <td class="row-actions">
            <button type="button" data-action="save" data-id="${entry.id}">Save</button>
            <button type="button" class="danger" data-action="delete" data-id="${entry.id}">Delete</button>
          </td>
        `;
        body.appendChild(row);
      });
    }

    document.getElementById("loginBtn").addEventListener("click", async () => {
      try {
        const password = document.getElementById("password").value;
        const result = await api("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ password }),
        });
        localStorage.setItem(TOKEN_KEY, result.token);
        setLoggedIn(true);
        await loadAdminData();
        showStatus("Signed in.");
      } catch (error) {
        showStatus(error.message, false);
      }
    });

    logoutBtn.addEventListener("click", async () => {
      try {
        await api("/api/logout", { method: "POST", headers: authHeaders(false) });
      } catch (_) {}
      localStorage.removeItem(TOKEN_KEY);
      setLoggedIn(false);
      showStatus("Signed out.");
    });

    document.getElementById("saveDonationsBtn").addEventListener("click", async () => {
      try {
        const milestones = JSON.parse(document.getElementById("milestonesJson").value || "[]");
        if (!Array.isArray(milestones)) throw new Error("Milestones must be an array.");
        await api("/api/site", {
          method: "POST",
          headers: authHeaders(),
          body: JSON.stringify({
            donations: {
              target: Number(document.getElementById("target").value),
              collected: Number(document.getElementById("collected").value),
              pending: Number(document.getElementById("pending").value),
              milestones,
            },
          }),
        });
        showStatus("Donations saved.");
      } catch (error) {
        showStatus(error.message, false);
      }
    });

    document.getElementById("saveSettingsBtn").addEventListener("click", async () => {
      try {
        const payload = {
          siteName: document.getElementById("siteName").value,
          goalDisplay: document.getElementById("goalDisplay").value,
          ctaText: document.getElementById("ctaText").value,
          readMoreText: document.getElementById("readMoreText").value,
        };
        const newPassword = document.getElementById("adminPassword").value;
        if (newPassword) payload.adminPassword = newPassword;
        await api("/api/site", {
          method: "POST",
          headers: authHeaders(),
          body: JSON.stringify({ settings: payload }),
        });
        document.getElementById("adminPassword").value = "";
        showStatus("Settings saved.");
      } catch (error) {
        showStatus(error.message, false);
      }
    });

    document.getElementById("saveStatusUpdatesBtn").addEventListener("click", async () => {
      try {
        const statusUpdates = JSON.parse(
          document.getElementById("statusUpdatesJson").value || "[]"
        );
        if (!Array.isArray(statusUpdates)) throw new Error("Status updates must be an array.");
        await api("/api/site", {
          method: "POST",
          headers: authHeaders(),
          body: JSON.stringify({ statusUpdates }),
        });
        showStatus("Status updates saved.");
      } catch (error) {
        showStatus(error.message, false);
      }
    });

    document.getElementById("saveContentBtn").addEventListener("click", async () => {
      try {
        await api("/api/site", {
          method: "POST",
          headers: authHeaders(),
          body: JSON.stringify({
            content: {
              heroTitleHtml: document.getElementById("heroTitleHtml").value,
              greetingHtml: document.getElementById("greetingHtml").value,
              introHtml: document.getElementById("introHtml").value,
              articleHtml: document.getElementById("articleHtml").value,
            },
          }),
        });
        showStatus("Homepage content saved.");
      } catch (error) {
        showStatus(error.message, false);
      }
    });

    document.getElementById("addSubscriberBtn").addEventListener("click", async () => {
      try {
        await api("/api/newsletter", {
          method: "POST",
          headers: authHeaders(),
          body: JSON.stringify({
            email: document.getElementById("newEmail").value,
            name: document.getElementById("newName").value,
            status: document.getElementById("newStatus").value,
          }),
        });
        document.getElementById("newEmail").value = "";
        document.getElementById("newName").value = "";
        await loadAdminData();
        showStatus("Subscriber added.");
      } catch (error) {
        showStatus(error.message, false);
      }
    });

    document.getElementById("newsletterBody").addEventListener("click", async (event) => {
      const button = event.target.closest("button");
      if (!button) return;
      const id = button.dataset.id;
      const action = button.dataset.action;
      const row = button.closest("tr");
      try {
        if (action === "delete") {
          await api("/api/newsletter/" + id, {
            method: "DELETE",
            headers: authHeaders(false),
          });
          await loadAdminData();
          showStatus("Subscriber removed.");
          return;
        }
        if (action === "save") {
          const email = row.querySelector('[data-field="email"]').value;
          const name = row.querySelector('[data-field="name"]').value;
          const status = row.querySelector('[data-field="status"]').value;
          await api("/api/newsletter/" + id, {
            method: "PUT",
            headers: authHeaders(),
            body: JSON.stringify({ email, name, status }),
          });
          showStatus("Subscriber updated.");
        }
      } catch (error) {
        showStatus(error.message, false);
      }
    });

    (async function init() {
      if (!token()) {
        setLoggedIn(false);
        return;
      }
      try {
        setLoggedIn(true);
        await loadAdminData();
      } catch (_) {
        localStorage.removeItem(TOKEN_KEY);
        setLoggedIn(false);
      }
    })();
  </script>
</body>
</html>
